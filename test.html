<!doctype html>
<html>
  <body>
    <button onclick="loadUsers()">Load Users</button>

    <script>
      function loadUsers() {
        fetch("http://localhost:5001/users", {
          headers: {
            Authorization: "Bearer mysecrettoken",
          },
        })
          .then((res) => res.json())
          .then((data) => console.log(data));
      }
    </script>
  </body>
</html>
